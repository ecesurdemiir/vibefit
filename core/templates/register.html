<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - VibeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { width: 100%; max-width: 450px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="card shadow register-card">
    <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4">VibeFit 🚀</h2>
        <p class="text-center text-muted mb-4">Kendi akıllı dolabını kurmaya başla!</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="small text-muted mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-2">Kayıt Ol ve Başla</button>
        </form>
        
        <hr class="my-4">
        <p class="text-center mb-0">Zaten bir dolabın var mı? <br> <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-primary">Giriş Yap</a></p>
    </div>
</div>

</body>
</html>
