<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeFit Gardırop</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Yan Menü (Sidebar) Tasarımı */
        .sidebar {
            height: 100vh;
            background-color: #5d4037; /* Görseldeki koyu kahve tonu */
            color: white;
            padding-top: 30px;
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h4 {
            padding: 0 20px 20px;
            font-weight: 800;
            letter-spacing: 1px;
            border-bottom: 1px solid #795548;
            margin-bottom: 20px;
        }

        .sidebar a {
            color: #d7ccc8;
            text-decoration: none;
            padding: 15px 25px;
            display: block;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .sidebar a:hover {
            background-color: #795548;
            color: white;
            padding-left: 35px;
        }

        .sidebar a.active {
            background-color: #8d6e63; /* Seçili olan menü rengi */
            color: white;
            border-left: 5px solid #d7ccc8;
        }

        /* Ana İçerik Alanı */
        .main-content {
            margin-left: 250px; /* Sidebar genişliği kadar boşluk */
            padding: 40px;
        }

        .user-info {
            padding: 20px;
            font-size: 0.9rem;
            color: #bcaaa4;
            position: absolute;
            bottom: 80px;
        }

        .logout-btn {
            position: absolute;
            bottom: 20px;
            width: 210px;
            left: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4>🧥 VibeFit</h4>
        
        <!-- Menü Linkleri -->
        <a href="{% url 'index' %}" id="nav-home">🏠 Ana Sayfa</a>
        <a href="{% url 'history' %}" id="nav-history">🕒 Son Giydiklerim</a>
        
        <div class="user-info">
            👤 Kullanıcı: <strong>{{ request.user.username }}</strong>
        </div>
        <!-- Bavul Linki-->
        <a href="{% url 'bavul_hazirla' %}" id="nav-bavul" class="{% if request.resolver_match.url_name == 'bavul_hazirla' %}active{% endif %}">🧳 Bavul Hazırla</a>
        <!-- Çıkış Butonu -->
        <form action="{% url 'logout' %}" method="POST" class="logout-btn">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm w-100">Güvenli Çıkış 🔒</button>
        </form>
    </div>

    <div class="main-content">
        <!-- Sayfaya özel içerikler  -->
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
