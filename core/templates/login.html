<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - VibeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="card shadow login-card">
    <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4">VibeFit 🚪</h2>
        <p class="text-center text-muted mb-4">Akıllı dolabına hoş geldin!</p>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control" required>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">Giriş Yap</button>
        </form>
        
        <hr class="my-4">
        <p class="text-center mb-0">Henüz bir dolabın yok mu? <br> <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Yeni Dolap Oluştur</a></p>
    </div>
</div>

</body>
</html>
