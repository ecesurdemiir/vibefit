{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - VibeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('{% static "img/login-bg.png" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.7); /* Cam efekti için şeffaflık */
            backdrop-filter: blur(15px); /* Arka planı bulanıklaştırma */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; /* Yumuşak köşeler */
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); /* Şık bir gölge */
        }
    
        /* İçerideki yazı yazma alanlarını (input) yumuşatıyoruz */
        .form-control {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1px solid rgba(255, 209, 220, 0.5) !important;
            border-radius: 15px !important;
            padding: 12px 15px !important;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02) !important;
        }
    
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(255, 209, 220, 0.6) !important;
            background: #ffffff !important;
        }
    
        /* Standart mavi butonu sihirli bir pudra pembesi butona çeviriyoruz */
        .btn-primary {
            background: linear-gradient(135deg, #FFD1DC 0%, #ffb6c1 100%) !important;
            border: none !important;
            border-radius: 15px !important;
            color: #2c3e50 !important;
            font-weight: 700 !important;
            padding: 12px !important;
            transition: transform 0.2s, box-shadow 0.2s !important;
        }
    
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 209, 220, 0.5) !important;
            background: linear-gradient(135deg, #ffb6c1 0%, #FFD1DC 100%) !important;
        }
    </style>
</head>
<body>

<div class="card shadow login-card">
    <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4">VibeFit 🚪</h2>
        <p class="text-center text-muted mb-4">Akıllı dolabına hoş geldin!</p>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control" required>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">Giriş Yap</button>
        </form>
        
        <hr class="my-4">
        <p class="text-center mb-0">Henüz bir dolabın yok mu? <br> <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Yeni Dolap Oluştur</a></p>
    </div>
</div>

</body>
</html>
