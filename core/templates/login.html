{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - VibeFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-image: url('{% static "img/login-bg.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(220, 180, 230, 0.3);
            padding: 40px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
        }
        
        .auth-form p { 
            margin-bottom: 18px; 
            display: flex;
            flex-direction: column;
        }
        
        .auth-form p label { 
            font-size: 13px; 
            color: #7c2d8a; 
            font-weight: 600; 
            margin-bottom: 6px; 
        }
        
        .auth-form p input {
            width: 100% !important; 
            padding: 10px 14px; 
            border: 1px solid rgba(220,180,230,0.4);
            border-radius: 12px; 
            font-size: 14px; 
            background: rgba(255,255,255,0.9); 
            outline: none;
            transition: all 0.2s;
        }
        
        .auth-form p input:focus {
            border-color: #a855f7;
            background: #fff;
            box-shadow: 0 0 8px rgba(168,85,247,0.15);
        }

        .gbtn {
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 600;
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;
            transition: all .2s; 
            margin-top: 25px;
        }
        
        .gbtn-primary { 
            background: linear-gradient(135deg, #e879b0, #a855f7); 
            color: #fff; 
            box-shadow: 0 4px 12px rgba(168,85,247,0.2); 
        }
        
        .gbtn-primary:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 6px 16px rgba(168,85,247,0.3); 
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #553555;
            line-height: 1.6;
        }
        
        .auth-link {
            color: #a855f7;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .auth-link:hover {
            color: #e879b0;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center d-flex flex-column align-items-center mb-4">
        <img src="{% static 'img/logo.png' %}" alt="VibeFit Logo" style="width: 110px; height: 110px; border-radius: 50%; border: 3px solid #FFD1DC; margin-bottom: 12px; object-fit: cover;">
        
        <p class="text-muted small mt-1 mb-0">Gardırobuna erişmek için bilgilerini gir.</p>
    </div>
    
    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="gbtn gbtn-primary">Giriş Yap</button>
    </form>
    
    <hr style="border-color: rgba(220,180,230,0.3); margin: 22px 0;">
    
    <div class="auth-footer">
        Henüz bir hesabın yok mu? <br> 
        <a href="{% url 'register' %}" class="auth-link mt-1 d-inline-block">Hemen Kayıt Ol</a>
    </div>
</div>

</body>
</html>
